# -- WHAT WE DO PAGE --------------------------------------------------
whatWeDo:
  seoTitle: "What we do — Metric + Maker"
  seoDescription: "Metric + Maker is active across the full development lifecycle: development & contracting, joint ventures, land & site acquisition, investment & asset delivery."
  header:
    eyebrow: "What we do"
    title: "Active across the full development <em>lifecycle.</em>"
    lead: "From site acquisition through to delivery — working independently and in joint venture with established and new partners. A disciplined, design-led approach, grounded in commercial reality."

  # The four service pillars. The short summary is used on the homepage
  # services grid. The detail paragraphs appear on /what-we-do.
  services:
    - id: development
      idx: "01"
      title: "Development + Contracting"
      summary: "Origination, planning, and delivery of residential and mixed-use schemes, with a focus on well-located sites where active management can create value."
      detail: "We take a hands-on approach across the full development lifecycle — from feasibility and planning through design development, procurement, construction oversight, and completion. Our combined track record covers over 5,000 homes delivered for leading residential developers in London and the Home Counties."

    - id: joint-ventures
      idx: "02"
      title: "Joint Ventures + Partnerships"
      summary: "Structuring and delivering projects in partnership with landowners, investors, and local authorities through flexible JV and development management arrangements."
      detail: "We partner with landowners, investors and developers to originate, structure, and deliver residential and mixed-use schemes. Our involvement typically spans the full development lifecycle, allowing us to maintain control of quality, programme, and commercial performance. We favour projects where close collaboration, clear alignment, and a disciplined approach can unlock the full potential of a site."
      structures:
        - "Joint ventures"
        - "Development management agreements"
        - "Equity partnerships"
        - "Option and promotion arrangements"

    - id: land
      idx: "03"
      title: "Land + Site Acquisition"
      summary: "Targeting sites with planning potential, repositioning opportunities, or development upside — including off-market and partnership-led transactions."
      detail: "Our acquisitions team has secured sites for 1,700+ homes with a combined GDV over £1.1bn. We move quickly and with conviction, backed by a clear commercial lens: does this deal stack, and what's the realistic path to value?"

    - id: investment
      idx: "04"
      title: "Investment + Asset Delivery"
      summary: "Managing projects through the full lifecycle — from acquisition and planning to construction, completion, and exit or long-term hold."
      detail: "We've collectively managed over £1bn of senior debt and raised £200m+ of equity for SME residential developers. Our directors advise institutional investors on the technical risks associated with developments, de-risking deals and ensuring every project stacks commercially."

  # JV sub-specialisms shown on /what-we-do under Joint Ventures.
  jvSubSpecialisms:
    - label: "Office to residential"
      title: "Unlocking obsolete commercial stock"
      body: "We partner with family offices and long-term landowners to unlock underused offices and oversized high-street assets — leveraging permitted development rights and reuse to reduce risk and deliver high-quality residential or mixed-use schemes."
    - label: "JV mixed-use development"
      title: "Policy-led sites, unlocked together"
      body: "We've delivered 12 JV schemes with Registered Providers and Local Authorities, helping unlock complex, policy-led sites they can't progress alone — and offering flexible returns (land, housing, or both) while keeping projects viable, fundable, and policy-aligned."
    - label: "Downsizer-friendly living"
      title: "Aspirational rightsizing for the over-55s"
      body: "Many over-55s want to downsize but reject traditional retirement living, leaving them in oversized homes. We target this underserved, equity-rich segment with high-quality 'lock and leave' homes — aspirational rightsizing for independent, lifestyle-driven buyers."
    - label: "Bespoke structures"
      title: "Flexible to the opportunity"
      body: "Every deal is different. We structure around the landowner's or investor's goals — whether that's maximising land value, retaining an ongoing stake, or minimising risk through phased delivery and clear governance."


# -- APPROACH / CASE STUDY PAGE --------------------------------------
approach:
  seoTitle: "Our Approach — Priory Park Gardens, Hitchin — Metric + Maker"
  seoDescription: "A case study of our approach in practice: Priory Park Gardens, Hitchin — a once-in-a-generation residential development in the historic grounds of Hitchin Priory."
  header:
    eyebrow: "Our approach, in practice"
    title: "Priory Park Gardens, <em>Hitchin.</em>"
    lead: "A once-in-a-generation residential development within the historic grounds of Hitchin Priory — delivered in joint venture with Myco."

  facts:
    - { number: "Hitchin",   label: "Herts — 2 mins from Hitchin town centre, 30 mins from London" }
    - { number: "30 acres",  label: "Of landscaped parkland within the historic grounds of Hitchin Priory" }
    - { number: "1–4 bed",   label: "Apartments and houses, design-led, site-sensitive" }
    - { number: "JV",        label: "Delivered in joint venture with Myco" }

  narrative:
    - number: "Project narrative"
      heading: "A site, a setting, and a scheme that had to rise to both."
      paragraphs:
        - "Priory Park Gardens takes a collection of former office buildings set within 30 acres of landscaped parkland — and reimagines them as a design-led residential scheme that respects and amplifies the site's history."
        - "At just two minutes from Hitchin town centre and thirty minutes from London, the location balances the rhythm of a market town with the reach of the capital. The scheme is pitched at buyers who value setting, architectural quality, and generous outdoor space — and who are underserved by the standardised new-build market."
    - number: "Our role"
      heading: "From land deal to delivery oversight."
      paragraphs:
        - "Metric + Maker secured the land deal and is overseeing full development and delivery — from planning and design through to construction and sales. We set the commercial framework, chose the JV partner (Myco), and are hands-on through every stage."
        - "Priory Park Gardens embodies our focus on creating homes and places that are commercially robust, carefully designed, and closely connected to their surroundings."

  principlesHeading: "Three principles that run through every scheme."
  principles:
    - label: "01 Discipline"
      title: "Every deal stacks."
      body: "We build our underwriting from the ground up. If the numbers don't work — on planning, build cost, or exit — we don't force the deal. When we do commit, we commit with full conviction."
    - label: "02 Design"
      title: "Design is where value lives."
      body: "We favour schemes where quality of design and setting is central to value — not bolted on after the spreadsheet. Good design pays for itself in planning, sales rate, and reputation."
    - label: "03 Delivery"
      title: "Hands-on, not hands-off."
      body: "We stay close to the work. Our directors sit on site, in planning meetings, in design reviews. Partnership-led doesn't mean passive — it means aligned."


