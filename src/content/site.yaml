# ============================================================
# METRIC + MAKER — SITE COPY
# ============================================================
# Edit the text values in this file to update the website.
# Everything to the right of a colon (:) is a value you can change.
# Save the file with a "Commit changes" button at the bottom of
# the GitHub page, and the website rebuilds itself in ~40 seconds.
#
# RULES OF THUMB
# - Keep the keys (the words before the colon) exactly as they are.
# - If your text contains a colon, wrap the whole thing in "quotes".
# - Lines starting with # are comments — ignored by the site.
# - For italic gold accents in headlines, wrap the words in <em>...</em>.
#   e.g.  headline: "Ambitious, <em>partnership-driven</em> development."
# - For em-dashes, just type a normal dash — or copy-paste —.
# ============================================================


# -- Site-wide defaults ------------------------------------------------
site:
  title: "Metric + Maker — Partnership-driven property development"
  description: "Metric + Maker is an SME residential and mixed-use developer. We deliver high-quality schemes through disciplined acquisition, planning-led value creation, and hands-on delivery."
  footerCopyright: "Metric + Maker Ltd. All rights reserved."


# -- Top navigation ---------------------------------------------------
# The site is single-page; nav links jump to anchored sections.
nav:
  links:
    - { label: "What we do",    href: "#what-we-do" }
    - { label: "Approach",      href: "#approach" }
    - { label: "Opportunities", href: "#opportunities" }
    - { label: "People",        href: "#people" }
    - { label: "Partners",      href: "#partners" }
  cta:
    label: "Contact"
    href: "#contact"


# -- HERO ------------------------------------------------------------
hero:
  headline: "Ambitious, <em>partnership-driven</em> property development."
  subheading: "Carefully selected sites, creative design, disciplined delivery."
  body: "We partner with landowners, investors, and local authorities to create exceptional homes and places that people can be proud of."
  ctaPrimary: "Start a conversation"
  ctaSecondary: "What we do"


# -- TRACK RECORD / STATS BAND ---------------------------------------
stats:
  number: "01 — Track record"
  heading: "The numbers behind the name."
  intro: "Prior to founding Metric + Maker, our co-founders delivered thousands of homes, managed over a billion pounds of investment capital for leading residential investors and developers across London and the South East."
  items:
    - number: "5,000"
      suffix: "+"
      label: "homes"
      sub: "Across private-for-sale and affordable tenure"
    - number: "£1bn"
      suffix: "+"
      label: "capital"
      sub: "Investment capital managed"
    - number: "60"
      suffix: "+"
      label: "yrs combined"
      sub: "Co-founder experience across the development lifecycle"


# -- WHAT WE DO ------------------------------------------------------
whatWeDo:
  number: "02 — What we do"
  heading: "End-to-end. From first site visit to last handover."
  intro: "We work independently and in joint venture — acquiring sites, driving planning-led value creation, managing design, and seeing projects through to delivery."
  services:
    - id: development
      idx: "01"
      title: "Development + Construction"
      body: "Design, planning, and delivery of residential and mixed-use schemes — with a focus on well-located sites where active management creates lasting value."
    - id: joint-ventures
      idx: "02"
      title: "Joint Ventures + Partnerships"
      body: "Working with landowners, investors, and LAs in flexible JV and development management arrangements — unlocking overlooked sites and delivering complex, policy-led schemes."
    - id: land
      idx: "03"
      title: "Land + Site Acquisition"
      body: "Targeting sites with planning potential, repositioning opportunities, or development upside — with a specialism in sensitive sites with complex planning histories."
    - id: asset-management
      idx: "04"
      title: "Asset Management + Optimisation"
      body: "Maximising opportunities to create commercially robust and carefully made schemes that stand the test of time for owners."


# -- OUR APPROACH (case study) ---------------------------------------
# Marketing agent's note: this section is intended as the permanent
# home for case studies once Priory Park Gardens is announced.
# It's live now; toggle `enabled: false` here to hide it pre-launch.
approach:
  enabled: true
  number: "03 — Our approach"
  heading: "Metric + Maker developments are <em>robust, creative, and site-sensitive.</em> Here's what that looks like in practice."
  caseStudy:
    title: "Priory Park Gardens, Hitchin."
    paragraphs:
      - "A former Carmelite friary site that has been home to kitchen gardens, a hospital, an office campus — and now, 700 years on, one of Hertfordshire's most considered new residential addresses."
      - "Set in 30 acres of parkland two minutes from Hitchin town centre, 30 minutes from London and 35 minutes from Cambridge."
      - "A complex, historically sensitive site that needed careful handling — and a JV structure that gave both partners the clarity to move decisively."
    facts:
      - { key: "Location", value: "Hitchin, Hertfordshire" }
      - { key: "Setting",  value: "30 acres of mature parkland" }
      - { key: "Tenure",   value: "1–4 bedroom apartments and houses" }
      - { key: "Status",   value: "Pre-launch" }
    # Set ctaEnabled to true to show the "Visit prioryparkgardens.com"
    # button under the case study; false hides it.
    ctaEnabled: false
    ctaLabel: "Visit prioryparkgardens.com"
    ctaHref: "https://prioryparkgardens.com"


# -- OPPORTUNITIES (new section) -------------------------------------
opportunities:
  number: "04 — Opportunities"
  heading: "What we're looking for."
  intro: "We're active partners. If you have a site, a scheme, or a conversation worth having, we want to hear from you."
  criteria:
    - "Residential and mixed-use development sites"
    - "Land with planning potential — allocated, unallocated, or with a complex planning history"
    - "Joint venture and partnership opportunities where a hands-on, design-led approach adds value"
    - "Off-market transactions and early-stage conversations"
    - "Schemes where quality, setting, and long-term placemaking matter"
    - "Affordable housing delivery and local authority partnerships"


# -- OUR PEOPLE ------------------------------------------------------
people:
  number: "05 — Our people"
  heading: "Four founders. One tight-knit, commercially minded team."
  intro: "Experts and innovators with a background in delivering for leading developers, private investors, and JV partnerships. We founded Metric + Maker to stay close to the work, and to create places where people and communities can thrive."

# Each director's bio appears under their portrait.
directors:
  # `role` uses <br> so each Co-founder's title wraps onto two lines for
  # consistent alignment across the four cards.
  - name: "Bradley Goding"
    role: "Partnerships +<br>Land Acquisition"
    linkedin: "https://www.linkedin.com/in/bradley-goding-b989b4a1/"
    bio: "Brad leads site sourcing, landowner relationships, and partnership structuring — with 18+ years identifying and securing development opportunities across sites totalling over 1,700 homes and £1.1bn GDV. An entrepreneurial, people-first operator, he brings energy and big-picture thinking to every partnership."

  - name: "Matthew Tucker"
    role: "Investments +<br>Asset Management"
    linkedin: "https://www.linkedin.com/in/matt-tucker-09a44119/"
    bio: "Matt leads investment strategy, development finance, and new business. He has 18+ years' experience advising investment partners on behalf of JLL, WSP and others across multiple real estate sectors, on deals ranging from £10m to £1.4bn GDV. His focus is on maximising opportunities and managing risk."

  - name: "James Hutchins"
    role: "Commercial<br>Operations"
    linkedin: "https://www.linkedin.com/in/james-hutchins-a74a0a1bb/"
    bio: "James leads commercial operations, cost management, and delivery — with 16+ years spent doing the work that makes complex projects actually happen. He's overseen more than £650m in build cost value and helped bring over 2,000 homes to life, bringing the rigour and focus that keeps ambitious projects on programme, on budget, and on brief."

  - name: "Sam Roberts"
    role: "Design +<br>Planning"
    linkedin: "https://www.linkedin.com/in/sam-roberts-3a39a5206/"
    bio: "Sam leads design strategy and planning with 16+ years spent helping ambitious projects find their shape. He's guided more than 2,200 homes from first idea to final completion — with a combined build cost exceeding £700m. Experienced in joint venture partnerships, he has a knack for bringing the right people together and turning complex briefs into built reality."


