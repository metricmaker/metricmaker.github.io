# ============================================================
# METRIC + MAKER — SITE COPY
# ============================================================
# Edit the text values in this file to update the website.
# Everything to the right of a colon (:) is a value you can change.
# Save the file with a "Commit changes" button at the bottom of
# the GitHub page, and the website rebuilds itself in ~40 seconds.
#
# RULES OF THUMB
# - Keep the keys (the words before the colon) exactly as they are.
# - If your text contains a colon, wrap the whole thing in "quotes".
# - Lines starting with # are comments — ignored by the site.
# - For italic gold accents in headlines, wrap the words in <em>...</em>.
#   e.g.  headline: "Ambitious, <em>partnership-driven</em> development."
# - For em-dashes, just type a normal dash — or copy-paste —.
# ============================================================


# -- Site-wide defaults ------------------------------------------------
site:
  title: "Metric + Maker — Partnership-driven property development"
  description: "Metric + Maker is an SME residential and mixed-use developer. We deliver high-quality schemes through disciplined acquisition, planning-led value creation, and hands-on delivery."
  footerCopyright: "Metric + Maker Ltd. All rights reserved."


# -- Top navigation ---------------------------------------------------
# The site is single-page; nav links jump to anchored sections.
# Add { label: "Approach", href: "#approach" } here once Priory Park
# Gardens is publicly announced (it's already on the page below).
nav:
  links:
    - { label: "What we do",    href: "#what-we-do" }
    - { label: "Opportunities", href: "#opportunities" }
    - { label: "People",        href: "#people" }
    - { label: "Partners",      href: "#partners" }
  cta:
    label: "Contact"
    href: "#contact"


# -- HERO ------------------------------------------------------------
hero:
  headline: "Ambitious, <em>partnership-driven</em> property development."
  subheading: "Carefully selected sites, creative design, and disciplined delivery."
  body: "We partner with landowners, investors, and local authorities to create exceptional homes and places that people can be proud of."
  ctaPrimary: "Start a conversation"
  ctaSecondary: "What we do"


# -- TRACK RECORD / STATS BAND ---------------------------------------
stats:
  number: "01 — Track record"
  heading: "The numbers behind the name."
  intro: "Prior to founding Metric + Maker, our directors delivered thousands of homes, managed over a billion pounds of senior debt, and raised nine-figure equity for leading residential developers across London and the South East."
  items:
    - number: "5,000"
      suffix: "+"
      label: "homes"
      sub: "Across private-for-sale and affordable tenure"
    - number: "£1bn"
      suffix: "+"
      label: "debt"
      sub: "Senior investment capital originated and managed"
    - number: "£200m"
      suffix: "+"
      label: "equity"
      sub: "Raised for award-winning residential schemes"
    - number: "60"
      suffix: "+"
      label: "yrs combined"
      sub: "Director experience across the development lifecycle"


# -- WHAT WE DO ------------------------------------------------------
whatWeDo:
  number: "02 — What we do"
  heading: "End-to-end. From first site visit to last handover."
  intro: "We work independently and in joint venture — acquiring sites, driving planning-led value creation, managing design, and seeing projects through to delivery."
  services:
    - id: development
      idx: "01"
      title: "Development + Contracting"
      body: "Design, planning, and delivery of residential and mixed-use schemes — with a focus on well-located sites where active management creates lasting value. Our directors have delivered over 5,000 homes for leading developers, creating thriving new communities and places nationwide. It's what we do."
    - id: joint-ventures
      idx: "02"
      title: "Joint Ventures + Partnerships"
      body: "Delivering projects alongside landowners, investors, and local authorities through flexible JV and development management arrangements. We've structured partnerships across nine-figure equity programmes, from unlocking underused and overlooked sites to delivering complex, policy-led schemes for LAs and registered providers."
    - id: land
      idx: "03"
      title: "Land + Site Acquisition"
      body: "Targeting sites with planning potential, repositioning opportunities, or development upside — including off-market and partnership-led transactions. We're specialists in sensitive sites with complex planning histories. We know if a site's viable before anyone else has run the numbers."
    - id: investment
      idx: "04"
      title: "Investment + Asset Delivery"
      body: "Managing projects through the full lifecycle — acquisition, planning, construction, completion, and exit or long-term hold. We've originated and managed £1bn in investment capital, and advised institutional investors on de-risking developments and ensuring deal stack."


# -- OUR APPROACH (case study) ---------------------------------------
# Marketing agent's note: this section is intended as the permanent
# home for case studies once Priory Park Gardens is announced.
# It's live now; toggle `enabled: false` here to hide it pre-launch.
approach:
  enabled: true
  number: "03 — Our approach"
  heading: "Metric + Maker developments are <em>robust, creative, and site-sensitive.</em> Here's what that looks like in practice."
  caseStudy:
    title: "Priory Park Gardens, Hitchin."
    paragraphs:
      - "A former Carmelite friary site that has been home to kitchen gardens, a hospital, an office campus — and now, 700 years on, one of Hertfordshire's most considered new residential addresses."
      - "Set in 30 acres of parkland two minutes from Hitchin town centre, 30 minutes from London and 35 minutes from Cambridge, Priory Park Gardens shows what becomes possible when disciplined site selection, planning strategy and design work together from the start."
      - "A complex, historically sensitive site that needed careful handling — and a JV structure that gave both partners the clarity to move decisively."
    facts:
      - { key: "Location", value: "Hitchin, Hertfordshire" }
      - { key: "Setting",  value: "30 acres of mature parkland" }
      - { key: "Tenure",   value: "1–4 bedroom apartments and houses" }
      - { key: "Partner",  value: "JV with Myco" }
      - { key: "Status",   value: "Pre-launch" }
    ctaLabel: "Visit prioryparkgardens.com"
    ctaHref: "https://prioryparkgardens.com"


# -- OPPORTUNITIES (new section) -------------------------------------
opportunities:
  number: "04 — Opportunities"
  heading: "What we're looking for."
  intro: "We're active buyers and partners. If you have a site, a scheme, or a conversation worth having, we want to hear from you."
  criteria:
    - "Residential and mixed-use development sites"
    - "Land with planning potential — allocated, unallocated, or with a complex planning history"
    - "Joint venture and partnership opportunities where a hands-on, design-led approach adds value"
    - "Off-market transactions and early-stage conversations"
    - "Schemes where quality, setting, and long-term placemaking matter"
    - "Affordable housing delivery and local authority partnerships"


# -- OUR PEOPLE ------------------------------------------------------
people:
  number: "05 — Our people"
  heading: "Four founders. One tight-knit, commercially minded team."
  intro: "Experts and innovators with a background in delivering for leading developers, private investors, and JV partnerships. We founded Metric + Maker to stay close to the work, and to create places where people and communities can thrive."

# Each director's bio appears under their portrait.
directors:
  - name: "Bradley Goding"
    role: "Partnerships + Land Acquisition"
    email: "brad@metricandmaker.com"
    bio: "Brad leads site sourcing, landowner relationships, and partnership structuring. He's spent 18+ years identifying and securing development opportunities — including sites for over 1,700 homes with a combined GDV exceeding £1.1bn. An entrepreneurial leader and people-first operator, Brad brings energy, optimism, and big-picture thinking to every partnership."

  - name: "Matthew Tucker"
    role: "Investments + New Business"
    email: "matt@metricandmaker.com"
    bio: "Matt leads investment strategy, development finance, and new business. Previously at JLL and WSP, he's spent 15+ years supporting £700m+ of investment across residential and mixed-use schemes. Every deal he works on is modelled, stress-tested, and modelled again. Detail is Matt's default — he de-risks, and makes sure every deal stacks."

  - name: "James Hutchins"
    role: "Commercial Operations"
    email: "james@metricandmaker.com"
    bio: "James leads commercial operations, cost management, and delivery. With 15+ years in mixed-use residential development, he has delivered over 1,700 homes at a combined build cost exceeding £555m. James keeps projects on programme, on budget, and on brief — and has a reputation for finding innovative solutions to complex challenges."

  - name: "Sam Roberts"
    role: "Design + Planning"
    email: "sam@metricandmaker.com"
    bio: "Sam leads design strategy and planning. 15+ years in mixed-use residential, with 1,750+ homes delivered at a combined build cost of £650m+. He works across architecture, landscape, and planning from the earliest stages. Sam turns big, creative ideas into things that actually get built — driving exceptional outcomes while keeping a tight rein on budgets."


